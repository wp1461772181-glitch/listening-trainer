# MySQL configuration (activate with --spring.profiles.active=mysql)
spring.datasource.url=jdbc:mysql://localhost:3306/listening_trainer?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root

# run schema.sql on startup
spring.sql.init.mode=always

# MyBatis-Plus
mybatis-plus.global-config.db-config.table-underline-to-camel=true
mybatis-plus.configuration.map-underscore-to-camel-case=true
