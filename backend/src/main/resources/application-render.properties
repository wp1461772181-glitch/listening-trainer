# Render cloud deployment
# Use env vars on Render dashboard to override:
#   SPRING_PROFILES_ACTIVE=render
#   APP_CORS_ORIGINS=https://your-app.vercel.app
#   APP_JWT_SECRET=<random-string>

spring.datasource.url=jdbc:h2:file:/app/data/listeningtrainer;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.sql.init.mode=always

mybatis-plus.global-config.db-config.table-underline-to-camel=true
mybatis-plus.configuration.map-underscore-to-camel-case=true

server.port=8080
