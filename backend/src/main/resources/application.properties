# Default profile uses H2 for easy local dev
# To use MySQL: set spring.profiles.active=mysql
spring.profiles.active=h2

# JWT
app.jwt.secret=listening-trainer-secret-key-change-in-production
app.jwt.expiration-ms=604800000

# CORS (comma-separated origin patterns, * for dev)
app.cors.origins=http://localhost:*

# Server
server.port=8080
